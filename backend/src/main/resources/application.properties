spring.application.name=integration-hub

spring.config.import=optional:file:.env[.properties]

# MongoDB Atlas — URI comes from the MONGODB_URI environment variable.
# NEVER commit credentials here. See .env.example for local setup.
spring.mongodb.uri=${MONGODB_URI}

# Server
server.port=8080

# Disable Spring Security for now (we'll add JWT later)
#spring.security.user.name=admin
#spring.security.user.password=admin123

# Application-specific JWT settings — secret comes from APP_JWT_SECRET env var.
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=86400000

# Order lifecycle timer delays (in seconds)
# Keep short for demo — increase for realistic simulation
lifecycle.confirmed-to-processing-seconds=30
lifecycle.processing-to-transit-seconds=60
lifecycle.transit-to-delivered-seconds=90

# --- SAP CPI bridge (OAuth2 client credentials) ---
cpi.base-url=${CPI_BASE_URL:}
cpi.po-outbound-path=/http/po-outbound
# iFlow 3 (stock-notification): vendor stock offer/reject -> counterparty procurement.
cpi.stock-offer-path=/http/stock-offer
# iFlow 3 full endpoint URL. System1 Vendor stock offer/reject is POSTed here; CPI iFlow3
# forwards it to the backend POST /api/cpi/inbound/stock-offer.
cpi.iflow3-stock-offer-url=${CPI_IFLOW3_STOCK_OFFER_URL:}
# iFlow 4 full endpoint URL. On delivery, System1 inventory movements are POSTed here; CPI iFlow4
# forwards to the backend POST /api/cpi/inbound/inventory-update (DECREASE/INCREASE).
cpi.iflow4-inventory-update-url=${CPI_IFLOW4_INVENTORY_UPDATE_URL:}
# iFlow 5 (inventory alert email): backend POSTs one consolidated low-stock batch every 10 min.
cpi.iflow5-alert-email-url=${CPI_IFLOW5_ALERT_EMAIL_URL:}

# --- Inventory low-stock alert scan (independent feature) ---
alert.inventory.scan-interval-ms=600000
alert.inventory.scan-initial-delay-ms=60000
alert.inventory.recipient.procurement=proc1@sys1.com
alert.inventory.recipient.admin=${ALERT_ADMIN_EMAIL:admin@sys1.com}
alert.inventory.recipient.vendor=vendor1@sys1.com
cpi.token-url=${CPI_TOKEN_URL:}
cpi.client-id=${CPI_CLIENT_ID:}
cpi.client-secret=${CPI_CLIENT_SECRET:}

# --- CPI bridge hardening ---
# Shared secret CPI must send as the X-CPI-Secret header on inbound calls.
# If blank, the check is skipped (dev mode). Set it for an industry-grade demo.
cpi.inbound-secret=${CPI_INBOUND_SECRET:}
# Outbound HTTP timeouts (ms) and retry policy for transient CPI failures.
cpi.connect-timeout-ms=5000
cpi.read-timeout-ms=15000
cpi.max-retries=3
cpi.retry-backoff-ms=500
# Cap on concurrently-open inbound POs (RECEIVED) to survive the System 2 timer flood.
cpi.max-open-pos=50

# --- System 2 simulator ---
# Starts running on boot; toggle at runtime via /api/simulator/start|stop.
simulator.enabled=true
# How often the simulator raises/approves (ms). 30000 = every 30s (fast demo/testing; was 600000 = 10 min).
simulator.interval-ms=100000
# Delay before the first tick after startup (ms).
simulator.initial-delay-ms=10000
# Max open POs the simulator will let pile up on System 1's vendor queue.
simulator.max-open-pos=40
# Fraction of System 1 procurement POs the S2 vendor rejects (0.0–1.0).
simulator.reject-rate=0.15
